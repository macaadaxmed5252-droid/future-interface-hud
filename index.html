<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Future Interface - Free Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        mono: ['Fira Code', 'monospace'],
                        cyber: ['Orbitron', 'sans-serif'],
                    },
                    animation: {
                        'spin-slow': 'spin 20s linear infinite',
                        'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'scan': 'scan 3s linear infinite',
                    },
                    keyframes: {
                        scan: {
                            '0%': { top: '-10%' },
                            '100%': { top: '110%' }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #020617; color: #22d3ee; }
        .glitch-text { text-shadow: 2px 0 #ff00f0, -2px 0 #00fff0; }
        .scanner-line { background: linear-gradient(to bottom, transparent, rgba(34, 211, 238, 0.2), transparent); }
    </style>
</head>
<body class="min-h-screen overflow-hidden font-mono flex items-center justify-center p-4">

    <div class="absolute inset-0 opacity-20 pointer-events-none">
        <div class="absolute inset-0 bg-[radial-gradient(#1e293b_1px,transparent_1px)] [background-size:20px_20px]"></div>
        <div class="scanner-line absolute left-0 w-full h-20 animate-scan"></div>
    </div>

    <div class="relative z-50 w-full max-w-5xl grid grid-cols-1 lg:grid-cols-12 gap-6 h-[80vh]">
        
        <div class="lg:col-span-4 bg-black/60 backdrop-blur-xl border border-cyan-500/30 rounded-3xl p-6 flex flex-col shadow-[0_0_50px_rgba(6,182,212,0.1)]">
            <div class="flex gap-2 mb-4">
                <div class="w-3 h-3 rounded-full bg-red-500/50"></div>
                <div class="w-3 h-3 rounded-full bg-yellow-500/50"></div>
                <div class="w-3 h-3 rounded-full bg-green-500/50"></div>
            </div>
            <div id="codeType" class="text-[10px] leading-relaxed text-cyan-400/80 overflow-hidden">
                </div>
        </div>

        <div class="lg:col-span-5 flex flex-col items-center justify-center relative">
            <div class="absolute w-[400px] h-[400px] border-2 border-dashed border-cyan-500/20 rounded-full animate-spin-slow"></div>
            <div class="absolute w-[320px] h-[320px] border border-indigo-500/30 rounded-full animate-spin-slow" style="animation-direction: reverse;"></div>
            
            <div class="text-center relative z-10 group">
                <h1 id="mainTitle" class="font-cyber text-6xl lg:text-8xl tracking-tighter text-white glitch-text mb-2">FREE</h1>
                <h1 id="subTitle" class="font-cyber text-6xl lg:text-8xl tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-indigo-600 mb-6">STYLE</h1>
                
                <div class="flex items-center justify-center gap-4">
                    <span class="px-4 py-1 border border-cyan-500/50 rounded-full text-[10px] uppercase tracking-widest animate-pulse-fast">System Active</span>
                    <span id="version" class="text-[10px] text-slate-500">v3.0.1_MERN</span>
                </div>
            </div>
        </div>

        <div class="lg:col-span-3 flex flex-col gap-4">
            <div class="bg-slate-900/80 border border-white/10 p-6 rounded-3xl backdrop-blur-md">
                <p class="text-[10px] uppercase mb-4 text-slate-400 font-bold">Override System Identity</p>
                <input type="text" oninput="updateIdentity(this.value)" placeholder="New Identity..." 
                class="w-full bg-black/50 border border-cyan-500/30 rounded-xl px-4 py-3 text-xs outline-none focus:border-cyan-500 transition-all text-white">
                
                <label class="mt-4 flex items-center justify-center w-full py-3 bg-gradient-to-r from-indigo-600 to-blue-600 rounded-xl text-[10px] font-bold cursor-pointer hover:opacity-80 transition-opacity">
                    UPLOAD BIO_DATA
                    <input type="file" class="hidden" onchange="updateImage(event)">
                </label>
            </div>

            <div class="flex-1 bg-cyan-500/5 border border-cyan-500/20 rounded-3xl relative overflow-hidden group">
                <img id="userImg" src="https://api.dicebear.com/7.x/bottts/svg?seed=Mucaad" class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-700">
                <div class="absolute inset-0 bg-gradient-to-t from-black to-transparent"></div>
                <div class="absolute bottom-4 left-4">
                    <p class="text-[10px] font-bold text-cyan-400 uppercase tracking-widest">Neural Link</p>
                    <p id="smallName" class="text-xs text-white opacity-60">@developer_mucaad</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Automatic Typing Effect
        const codeLines = [
            "const system = 'MUCAAD_OS';",
            "let status = 'INITIALIZING';",
            "import { creativity } from 'brain';",
            "if (status === 'READY') {",
            "  launchFullStack();",
            "  renderFutureUI();",
            "}",
            "// Optimizing Node.js clusters...",
            "// React components mounting...",
            "// Tailwind JIT compiling...",
            "console.log('Vibe Check: Passed');"
        ];

        let i = 0;
        function type() {
            if (i < codeLines.length) {
                document.getElementById('codeType').innerHTML += codeLines[i] + "<br>";
                i++;
                setTimeout(type, 800);
            } else {
                i = 0;
                document.getElementById('codeType').innerHTML = "";
                setTimeout(type, 500);
            }
        }
        type();

        // Identity Update
        function updateIdentity(val) {
            const title = document.getElementById('mainTitle');
            const sub = document.getElementById('subTitle');
            const smallName = document.getElementById('smallName');
            
            if(val.length > 0) {
                const parts = val.trim().split(" ");
                title.innerText = parts[0].toUpperCase();
                sub.innerText = parts.slice(1).join(" ").toUpperCase() || "SYSTEM";
                smallName.innerText = "@" + val.toLowerCase().replace(/\s+/g, '_');
            } else {
                title.innerText = "FREE";
                sub.innerText = "STYLE";
                smallName.innerText = "@developer_mucaad";
            }
        }

        // Image Update
        function updateImage(event) {
            const reader = new FileReader();
            reader.onload = () => {
                document.getElementById('userImg').src = reader.result;
            }
            reader.readAsDataURL(event.target.files[0]);
        }
    </script>
</body>
</html>
